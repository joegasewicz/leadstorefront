version: '3.8'

services:
  ollama:
    image: ollama/ollama
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    environment:
      - OLLAMA_MODELS=mistral
    entrypoint: /bin/sh
    command: -c "ollama serve & sleep 2 && ollama pull mistral && wait"
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -qO- http://127.0.0.1:11434/api/tags >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  ollama_data:
