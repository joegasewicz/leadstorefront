services:
  postgres-platformdb:
    image: postgres:16-alpine
    env_file:
      - .env-dev
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-platformdb_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-platformdb_data:
